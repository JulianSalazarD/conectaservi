{{define "services_form.html"}}{{template "_header" .}}
<section>
  <h1>Nuevo servicio</h1>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="POST" action="/web/services" class="stack">
    <label>
      <span>Provider ID <small>(UUID del prestador)</small></span>
      <input type="text" name="provider_id" value="{{.Form.ProviderID}}" required>
    </label>
    <label>
      <span>Categoría</span>
      <select name="category_id" required>
        <option value="">— seleccione —</option>
        {{range .Categories}}
        <option value="{{.ID}}" {{if eq (printf "%s" .ID) $.Form.CategoryID}}selected{{end}}>{{.Nombre}}</option>
        {{end}}
      </select>
    </label>
    <label>
      <span>Título</span>
      <input type="text" name="titulo" value="{{.Form.Titulo}}" required maxlength="200">
    </label>
    <label>
      <span>Descripción</span>
      <textarea name="descripcion" rows="3">{{.Form.Descripcion}}</textarea>
    </label>
    <label>
      <span>Precio base</span>
      <input type="number" step="0.01" min="0" name="precio_base" value="{{.Form.PrecioBase}}" required>
    </label>
    <fieldset class="grid-2">
      <legend>Ubicación (opcional)</legend>
      <label>
        <span>Latitud</span>
        <input type="number" step="0.000001" min="-90" max="90" name="lat" value="{{.Form.Lat}}">
      </label>
      <label>
        <span>Longitud</span>
        <input type="number" step="0.000001" min="-180" max="180" name="lng" value="{{.Form.Lng}}">
      </label>
      <label>
        <span>Radio (km)</span>
        <input type="number" step="0.01" min="0" name="radio_km" value="{{.Form.RadioKm}}">
      </label>
    </fieldset>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="/web/services" class="btn">Cancelar</a>
    </div>
  </form>
</section>
{{template "_footer" .}}{{end}}
